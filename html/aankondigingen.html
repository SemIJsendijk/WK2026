<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WK 2026 - Aankondigingen</title>
    <link rel="stylesheet" href="./css/header.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF7F00;
            --primary-dark: #cc6600;
            --secondary: #0055ff;
            --text: #1a1a1a;
            --text-light: #666;
            --bg: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #FF7F00 0%, #ffffff 100%);
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 100px;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(to right, #FF7F00, #0055ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-light);
            max-width: 600px;
            margin: 10px auto;
        }

        .announcement-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }


        .announcement-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(255, 127, 0, 0.1);
        }

        .announcement-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .announcement-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary);
            margin: 0;
            flex: 1;
        }

        .announcement-date {
            font-size: 0.9rem;
            color: var(--text-light);
            white-space: nowrap;
            margin-left: 20px;
        }

        .announcement-content {
            font-size: 1.1rem;
            color: var(--text);
            white-space: pre-wrap;
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            font-style: italic;
            color: var(--text-light);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-back {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 40px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 127, 0, 0.3);
        }

        .btn-back:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 127, 0, 0.4);
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero">
            <h1>Aankondigingen</h1>
            <p>Blijf op de hoogte van de laatste updates en nieuws over de WK 2026 Poule</p>
        </div>

        <div id="announcements-container">
            <div class="loading-spinner">Aankondigingen laden...</div>
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <a href="home.html" class="btn-back">Terug naar Home</a>
        </div>
    </div>

    <footer>
        <div class="header-container header-flex">
            <a href="home.html" class="header-brand">
                <h1>WK 2026 <span>Nieuws</span></h1>
            </a>
            <div class="header-nav">
                <a href="leaderboard.html" class="btn-nav">Stand</a>
                <a href="voorspellingen.html" class="btn-nav">Voorspellingen</a>
                <a href="account.html" class="btn-nav">Mijn Account</a>
                <button id="logout-btn" class="btn-nav btn-logout">Uitloggen</button>
            </div>
        </div>
    </footer>

    <script type="module" src="./js/aankondigingen.js"></script>
    <script>
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = './index.html';
        });
    </script>
</body>

</html>
