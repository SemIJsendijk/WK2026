<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>home</title>
	<link rel="stylesheet" href="./css/header.css">
	<noscript>
		<meta http-equiv="refresh" content="0;url=index.html">
	</noscript>
	<style>
		html {
			scroll-snap-type: y mandatory;
			scroll-behavior: smooth;
		}

		body {
			margin: 0;
			background: linear-gradient(180deg, #FF7F00 0%, #ffffff 100%);
			background-attachment: fixed;
			font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
		}

		.snap-section {
			height: 100vh;
			width: 100%;
			scroll-snap-align: start;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			position: relative;
		}

		.gif-box {
			max-width: 95vw;
			max-height: 80vh;
			width: 100%;
			border-radius: 60px;
			overflow: hidden;
			background: transparent;
			border: 3px solid transparent;
			transition: transform 0.3s ease;
		}

		.gif-placeholder {
			width: 100%;
			height: auto;
			display: block;
			min-height: 60vh;
			object-fit: contain;
			border-radius: 60px;
		}

		.success-text {
			font-size: clamp(3rem, 15vw, 8rem);
			font-weight: 900;
			color: var(--primary);
			text-transform: uppercase;
			letter-spacing: -2px;
			margin: 0;
			text-align: center;
			text-shadow: 0 10px 30px rgba(255, 127, 0, 0.3);
			animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
		}

		@keyframes popIn {
			0% {
				opacity: 0;
				transform: scale(0.5);
			}

			100% {
				opacity: 1;
				transform: scale(1);
			}
		}

		footer {
			position: fixed;
			bottom: 0;
			left: 0;
			width: 100%;
			z-index: 100;
			background: rgba(255, 255, 255, 0.9);
			backdrop-filter: blur(10px);
			border-top: 1px solid var(--border);
		}
	</style>
</head>

<body>
	<main>
		<section class="snap-section">
			<div class="gif-box">
				<img src="./pictures/giphy.gif" alt="WK 2026 Animatie" class="gif-placeholder">
			</div>
		</section>

		<section class="snap-section">
			<a href="leaderboard.html" class="success-text stand-link" style="text-decoration: none;">Stand</a>
		</section>

		<section class="snap-section">
			<h2 class="success-text">Succes</h2>
		</section>
	</main>

	<style>
		.stand-link {
			transition: transform 0.3s ease, color 0.3s ease;
			cursor: pointer;
		}

		.stand-link:hover {
			transform: scale(1.1);
			color: #0055ff;
			/* Match the blue from nav buttons on hover */
		}
	</style>

	<footer>
		<div class="header-container header-flex">
			<a href="home.html" class="header-brand">
				<h1>WK 2026 <span>Home</span></h1>
			</a>
			<div class="header-nav">
				<a href="voorspellingen.html" class="btn-nav">Voorspellingen</a>
				<a href="account.html" class="btn-nav">Mijn Account</a>
				<button id="logout-btn" class="btn-nav btn-logout">Uitloggen</button>
			</div>
		</div>
	</footer>

	<script>
		// Basic logout logic to clear the saved session and redirect
		document.getElementById('logout-btn').addEventListener('click', () => {
			localStorage.removeItem('currentUser');
			window.location.href = './index.html';
		});
	</script>
</body>

</html>
