<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WK 2026 - Leaderboard</title>
    <link rel="stylesheet" href="./css/voorspellingen.css">
    <link rel="stylesheet" href="./css/header.css">
    <style>
        .leaderboard-container {
            max-width: 800px;
            margin: 40px auto;
        }

        .rank-1 {
            background-color: #ffd700;
            font-weight: bold;
        }

        /* Goud */
        .rank-2 {
            background-color: #e3e4e5;
            font-weight: bold;
        }

        /* Zilver */
        .rank-3 {
            background-color: #cd7f32;
            font-weight: bold;
        }

        /* Brons */
        .leaderboard-name {
            cursor: pointer;
            color: #000000;
            font-weight: 600;
        }

        .leaderboard-name:hover {
            text-decoration: underline;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .prediction-teams {
            font-weight: 600;
        }

        .prediction-score {
            font-family: monospace;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .locked-msg {
            color: var(--text-dim);
            font-style: italic;
            font-size: 0.85rem;
            margin-top: 15px;
            text-align: center;
        }
    </style>

    <link rel="manifest" href="./json/manifest.json">
    <meta name="theme-color" content="#FF7F00">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./js/sw.js', { scope: '../' }).catch(err => console.log('SW ref fail', err));
            });
        }
    </script>
</head>

<body>
    <header>
        <div class="header-container header-flex">
            <a href="home.html" class="header-brand">
                <h1>WK 2026 <span>Leaderboard</span></h1>
            </a>
            <div class="header-nav">
                <a href="standings.html" class="btn-nav">Groepsstanden</a>
                <a href="aankondigingen.html" class="btn-nav">Aankondigingen</a>
                <a href="voorspellingen.html" class="btn-nav">Voorspellingen</a>
                <a href="account.html" class="btn-nav">Mijn Account</a>
                <button id="logout-btn" class="btn-nav btn-logout">Uitloggen</button>
            </div>
        </div>
    </header>

    <main class="container leaderboard-container">
        <h2 class="section-title">Stand Algemeen Klassement</h2>

        <div class="card table-card">
            <table class="ko-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th class="text-left">Speler</th>
                        <th>Punten</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr>
                        <td colspan="3">Leaderboard laden...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Predictions Modal -->
    <div id="predictions-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-user-title">Voorspellingen</h2>
            <div id="predictions-container">
                <div class="stats-loading">Laden...</div>
            </div>
            <p class="locked-msg">Alleen gestarte wedstrijden zijn zichtbaar.</p>
        </div>
    </div>

    <script type="module">
        import { fetchLeaderboard, renderLeaderboard, subscribeToUpdates } from './js/leaderboard.js';

        async function init() {
            const data = await fetchLeaderboard();
            renderLeaderboard(data);

            // Luister live naar updates in alle 3 de tabellen die de score beïnvloeden
            subscribeToUpdates(async () => {
                const updatedData = await fetchLeaderboard();
                renderLeaderboard(updatedData);
            });
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = './index.html';
        });

        init();
    </script>
</body>

</html>
